<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="128" cy="128" r="120" fill="#1e293b" />
  
  <!-- Mining Node -->
  <rect x="70" y="80" width="116" height="96" rx="10" fill="#1d4ed8" />
  
  <!-- Node Glow -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3" />
  <circle cx="128" cy="128" r="80" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.2" />
  <circle cx="128" cy="128" r="60" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.1" />
  
  <!-- Mining Activity -->
  <path d="M100,110 L90,130 L110,130 Z" fill="#60a5fa" />
  <path d="M120,100 L110,120 L130,120 Z" fill="#60a5fa" />
  <path d="M140,110 L130,130 L150,130 Z" fill="#60a5fa" />
  <path d="M100,140 L90,160 L110,160 Z" fill="#60a5fa" />
  <path d="M120,130 L110,150 L130,150 Z" fill="#60a5fa" />
  <path d="M140,140 L130,160 L150,160 Z" fill="#60a5fa" />
  
  <!-- Energy Pulses -->
