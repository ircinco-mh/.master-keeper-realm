  <circle cx="128" cy="128" r="10" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.5" />
  <circle cx="128" cy="128" r="15" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.3" />
</svg>
